name: stockpro
description: Enterprise Inventory Management System — Flutter client
publish_to: 'none'
version: 0.1.0

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # State management
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5

  # Backend
  supabase_flutter: ^2.5.6

  # Routing
  go_router: ^14.2.0

  # Local/offline storage (Warehouse module needs offline-first, see PRD §6)
  drift: ^2.18.0
  sqlite3_flutter_libs: ^0.5.20
  path_provider: ^2.1.3
  path: ^1.9.0

  # Data classes / immutability
  freezed_annotation: ^2.4.4
  json_annotation: ^4.9.0

  # UI
  google_fonts: ^6.2.1
  fl_chart: ^0.68.0
  data_table_2: ^2.5.15
  shimmer: ^3.0.0

  # Barcode / QR
  mobile_scanner: ^5.1.1
  qr_flutter: ^4.1.0

  # Utilities
  intl: ^0.19.0
  logger: ^2.4.0
  connectivity_plus: ^6.0.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  build_runner: ^2.4.11
  freezed: ^2.5.5
  json_serializable: ^6.8.0
  riverpod_generator: ^2.4.3
  drift_dev: ^2.18.0
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
  # assets:
  #   - assets/images/
  #   - assets/icons/
