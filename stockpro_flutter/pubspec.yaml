name: stockpro
description: Enterprise Inventory Management System — Flutter client
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # State management
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5

  # Backend
  supabase_flutter: ^2.5.6

  # Routing
  go_router: ^14.2.0

  # Offline-first local cache (Warehouse module — Phase 5+)
  drift: ^2.18.0
  sqlite3_flutter_libs: ^0.5.20
  path_provider: ^2.1.3
  path: ^1.9.0

  # Barcode / QR (Phase 4+)
  mobile_scanner: ^5.1.1
  qr_flutter: ^4.1.0

  # Charts (Dashboard — Phase 9)
  fl_chart: ^0.68.0

  # Utilities
  freezed_annotation: ^2.4.1
  json_annotation: ^4.9.0
  intl: ^0.19.0
  logger: ^2.4.0
  flutter_dotenv: ^5.1.0

  cupertino_icons: ^1.0.8

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  build_runner: ^2.4.11
  riverpod_generator: ^2.4.0
  freezed: ^2.5.5
  json_serializable: ^6.8.0
  drift_dev: ^2.18.0
  mocktail: ^1.0.4

flutter:
  uses-material-design: true
  assets:
    - .env
    - assets/images/
    - assets/icons/
